<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Student Management System</h2>
<a href="/showNewStudentForm">Add Student</a>

<table border="1">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Course</th>
    <th>Marks</th>
    <th>Actions</th>
</tr>

<tr th:each="student : ${students}">
    <td th:text="${student.name}"></td>
    <td th:text="${student.email}"></td>
    <td th:text="${student.course}"></td>
    <td th:text="${student.marks}"></td>
    <td>
        <a th:href="@{/showFormForUpdate/{id}(id=${student.id})}">Update</a>
        <a th:href="@{/deleteStudent/{id}(id=${student.id})}">Delete</a>
    </td>
</tr>

</table>

</body>
</html>
